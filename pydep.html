<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyDep Explorer — Python Dependency Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ================================================================
           CSS RESET & VARIABLES
           ================================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-bg-hover: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.05) 100%);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent-1: #6c5ce7;    /* Purple */
            --accent-2: #a29bfe;    /* Light purple */
            --accent-3: #00cec9;    /* Teal */
            --accent-4: #fd79a8;    /* Pink */
            --accent-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            --glow-purple: rgba(108, 92, 231, 0.3);
            --glow-teal: rgba(0, 206, 201, 0.3);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --shadow-glow: 0 0 40px rgba(108, 92, 231, 0.15);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        html { height: 100%; scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ================================================================
           ANIMATED BACKGROUND
           ================================================================ */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: orbFloat 20s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-1);
            top: -10%; left: -10%;
            animation-duration: 25s;
        }
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-3);
            bottom: -10%; right: -10%;
            animation-duration: 30s;
            animation-delay: -10s;
        }
        .bg-orb:nth-child(3) {
            width: 300px; height: 300px;
            background: var(--accent-4);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 22s;
            animation-delay: -5s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 60px) scale(0.9); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }

        /* Noise overlay for texture */
        .bg-canvas::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.5;
        }

        /* ================================================================
           GLASSMORPHISM UTILITY CLASSES
           ================================================================ */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
        }
        .glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: var(--glass-shine);
            pointer-events: none;
        }
        .glass-hover:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-glass), var(--shadow-glow);
        }

        /* ================================================================
           LAYOUT
           ================================================================ */
        .app {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            width: 100%;
        }
        .container {
            width: 100%;
            max-width: 720px;
        }

        /* ================================================================
           HEADER / LOGO
           ================================================================ */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeSlideDown 0.8s ease-out;
        }
        .logo {
            display: inline-flex;
            align-items: baseline;
            gap: 2px;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            user-select: none;
        }
        .logo span {
            display: inline-block;
            transition: transform var(--transition-spring);
        }
        .logo:hover span {
            animation: logoWave 0.6s ease forwards;
        }
        .logo span:nth-child(1) { color: #6c5ce7; }
        .logo span:nth-child(2) { color: #a29bfe; }
        .logo span:nth-child(3) { color: #00cec9; }
        .logo span:nth-child(4) { color: #fd79a8; }
        .logo span:nth-child(5) { color: #fdcb6e; }

        .logo:hover span:nth-child(1) { animation-delay: 0s; }
        .logo:hover span:nth-child(2) { animation-delay: 0.05s; }
        .logo:hover span:nth-child(3) { animation-delay: 0.1s; }
        .logo:hover span:nth-child(4) { animation-delay: 0.15s; }
        .logo:hover span:nth-child(5) { animation-delay: 0.2s; }

        @keyframes logoWave {
            0% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ================================================================
           SEARCH
           ================================================================ */
        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
            animation: fadeSlideUp 0.7s 0.1s ease-out both;
        }
        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
            border-radius: var(--radius-xl);
            padding: 6px 6px 6px 20px;
            transition: all var(--transition-smooth);
            overflow: hidden;
        }
        .search-bar:focus-within {
            border-color: rgba(108, 92, 231, 0.4);
            box-shadow: var(--shadow-glass), 0 0 30px var(--glow-purple), 0 0 60px rgba(108, 92, 231, 0.1);
        }
        .search-icon {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-right: 12px;
            transition: color var(--transition-fast);
        }
        .search-bar:focus-within .search-icon {
            color: var(--accent-2);
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            padding: 12px 0;
            min-width: 0;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .version-input {
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            outline: none;
            padding: 8px 12px;
            width: 100px;
            border-radius: var(--radius-sm);
            text-align: center;
            margin-right: 8px;
            transition: all var(--transition-fast);
        }
        .version-input:focus {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-primary);
        }
        .version-input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
        .search-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 15px var(--glow-purple);
            position: relative;
            overflow: hidden;
        }
        .search-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            border-radius: inherit;
        }
        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px var(--glow-purple);
        }
        .search-btn:active {
            transform: scale(0.96);
        }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0; right: 0;
            border-radius: var(--radius-md);
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .autocomplete-dropdown.visible { display: block; }
        .autocomplete-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--transition-fast);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.active {
            background: rgba(108, 92, 231, 0.12);
        }
        .autocomplete-item .ac-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .autocomplete-item .ac-version {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Scrollbar for dropdown */
        .autocomplete-dropdown::-webkit-scrollbar { width: 6px; }
        .autocomplete-dropdown::-webkit-scrollbar-track { background: transparent; }
        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        /* ================================================================
           STATS BAR
           ================================================================ */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.6s 0.3s ease-out both;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .stat-value {
            font-weight: 700;
            font-family: var(--font-mono);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================================================================
           RESULTS
           ================================================================ */
        .results-section {
            display: none;
            animation: fadeSlideUp 0.5s ease-out;
        }
        .results-section.visible { display: block; }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding: 0 4px;
        }
        .results-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .results-title strong {
            color: var(--text-primary);
            font-weight: 700;
        }
        .results-count {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
        }

        /* ================================================================
           DEPENDENCY TREE
           ================================================================ */
        .dep-tree {
            list-style: none;
            padding: 0;
        }
        .dep-node {
            position: relative;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            overflow: hidden;
            animation: nodeSlideIn 0.4s ease-out both;
            transition: all var(--transition-smooth);
        }
        .dep-node:hover {
            border-color: var(--glass-border-hover);
        }

        .dep-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            position: relative;
        }
        /* Liquid glass shimmer on hover */
        .dep-row::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }
        .dep-node:hover .dep-row::after {
            left: 100%;
        }

        .dep-icon {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(0, 206, 201, 0.1));
            color: var(--accent-2);
            border: 1px solid rgba(108, 92, 231, 0.15);
        }
        .dep-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .dep-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition-fast);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        a.dep-name:hover {
            color: var(--accent-2);
        }
        .dep-version {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .dep-badge {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .dep-badge.conditional {
            color: var(--accent-4);
            background: rgba(253, 121, 168, 0.1);
            border: 1px solid rgba(253, 121, 168, 0.2);
        }

        .expand-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            font-size: 0.7rem;
        }
        .expand-btn:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
            background: rgba(108, 92, 231, 0.08);
        }
        .expand-btn.expanded { transform: rotate(90deg); }
        .expand-btn.loading {
            color: var(--accent-3);
            border-color: rgba(0, 206, 201, 0.3);
        }
        .expand-btn.loading svg {
            animation: spin 0.8s linear infinite;
        }
        .expand-btn.no-deps {
            opacity: 0.3;
            cursor: default;
        }

        /* Sub-tree */
        .sub-tree {
            list-style: none;
            padding: 0 0 0 28px;
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-smooth), padding var(--transition-smooth);
            position: relative;
        }
        .sub-tree::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 8px;
            width: 1px;
            background: linear-gradient(to bottom, var(--glass-border), transparent);
        }
        .sub-tree.visible {
            padding-top: 4px;
            padding-bottom: 4px;
        }
        .sub-tree .dep-node {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            margin-bottom: 4px;
            margin-left: 8px;
        }
        .sub-tree .dep-node::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 50%;
            width: 9px;
            height: 1px;
            background: var(--glass-border);
        }
        .sub-tree .dep-row { padding: 10px 14px; }
        .sub-tree .dep-icon { width: 28px; height: 28px; font-size: 0.75rem; }
        .sub-tree .dep-name { font-size: 0.88rem; }
        .sub-tree .dep-version { font-size: 0.7rem; padding: 2px 8px; }

        /* ================================================================
           LOADING / ERROR / EMPTY STATES
           ================================================================ */
        .loader-overlay {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            flex-direction: column;
            gap: 1rem;
        }
        .loader-overlay.visible { display: flex; }

        .loader-ring {
            width: 40px; height: 40px;
            border: 3px solid rgba(108, 92, 231, 0.1);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .error-card {
            display: none;
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            text-align: center;
            background: rgba(214, 48, 49, 0.08);
            border: 1px solid rgba(214, 48, 49, 0.2);
            color: #ff6b6b;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease-out;
        }
        .error-card.visible { display: block; }

        .empty-state {
            display: none;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
        }
        .empty-state.visible { display: block; }

        /* ================================================================
           FOOTER
           ================================================================ */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }
        footer a {
            color: var(--accent-2);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }

        /* ================================================================
           ANIMATIONS
           ================================================================ */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes nodeSlideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* stagger children */
        .dep-node:nth-child(1) { animation-delay: 0.02s; }
        .dep-node:nth-child(2) { animation-delay: 0.06s; }
        .dep-node:nth-child(3) { animation-delay: 0.1s; }
        .dep-node:nth-child(4) { animation-delay: 0.14s; }
        .dep-node:nth-child(5) { animation-delay: 0.18s; }
        .dep-node:nth-child(6) { animation-delay: 0.22s; }
        .dep-node:nth-child(7) { animation-delay: 0.26s; }
        .dep-node:nth-child(8) { animation-delay: 0.3s; }
        .dep-node:nth-child(9) { animation-delay: 0.34s; }
        .dep-node:nth-child(10) { animation-delay: 0.38s; }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 600px) {
            .logo { font-size: 2.2rem; }
            .stats-bar { gap: 1rem; flex-wrap: wrap; }
            .version-input { width: 80px; }
            .dep-info { flex-direction: column; align-items: flex-start; gap: 4px; }
            .dep-version { max-width: 160px; }
        }
    </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>

<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="logo" aria-label="PyDep Explorer">
            <span>P</span><span>y</span><span>D</span><span>e</span><span>p</span>
        </div>
        <p class="tagline">Python Dependency Explorer</p>
    </header>

    <!-- Search -->
    <div class="container">
        <div class="search-wrapper">
            <form id="search-form" class="search-bar glass" autocomplete="off">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="pkg-name" class="search-input" placeholder="Search a Python package..." required aria-label="Package name">
                <input type="text" id="pkg-version" class="version-input" placeholder="latest" aria-label="Version">
                <button type="submit" class="search-btn" title="Search" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>
            <!-- Autocomplete -->
            <div id="autocomplete" class="autocomplete-dropdown glass" role="listbox"></div>
        </div>

        <!-- Stats -->
        <div id="stats-bar" class="stats-bar" style="display:none;">
            <div class="stat-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span><span id="stat-direct" class="stat-value">0</span> direct</span>
            </div>
            <div class="stat-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span><span id="stat-total" class="stat-value">0</span> total loaded</span>
            </div>
        </div>

        <!-- Loading -->
        <div id="loader" class="loader-overlay">
            <div class="loader-ring"></div>
            <span class="loader-text">Resolving dependencies...</span>
        </div>

        <!-- Error -->
        <div id="error" class="error-card"></div>

        <!-- Results -->
        <div id="results" class="results-section">
            <div class="results-header">
                <span class="results-title">Dependencies for <strong id="pkg-display"></strong></span>
                <span id="dep-count" class="results-count"></span>
            </div>
            <ul id="dep-tree" class="dep-tree" role="tree"></ul>
            <p id="empty-msg" class="empty-state">This package has no dependencies.</p>
        </div>
    </div>
</div>

<footer>
    &copy; 2025 Peter Aldrich Jr. All rights reserved. &mdash; Powered by <a href="https://pypi.org" target="_blank" rel="noopener noreferrer">PyPI</a>
</footer>

<script>
    /* ================================================================
       STATE & CONFIG
       ================================================================ */
    const MAX_DEPTH = 10;
    const AUTOCOMPLETE_DELAY = 300;
    const activeFetches = new Set();
    let totalNodesLoaded = 0;
    let autocompleteTimer = null;
    let autocompleteIndex = -1;
    let autocompleteResults = [];

    /* ================================================================
       DOM REFS
       ================================================================ */
    const $ = (sel) => document.querySelector(sel);
    const form = $('#search-form');
    const nameInput = $('#pkg-name');
    const versionInput = $('#pkg-version');
    const loader = $('#loader');
    const errorCard = $('#error');
    const results = $('#results');
    const depTree = $('#dep-tree');
    const pkgDisplay = $('#pkg-display');
    const depCount = $('#dep-count');
    const emptyMsg = $('#empty-msg');
    const statsBar = $('#stats-bar');
    const statDirect = $('#stat-direct');
    const statTotal = $('#stat-total');
    const acDropdown = $('#autocomplete');

    /* ================================================================
       SVG ICONS (inline for no external deps)
       ================================================================ */
    const ICONS = {
        package: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4l-9-5.19"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
        chevron: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
        spinner: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>`,
        check: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
        alert: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        leaf: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66L7 18"/><path d="M17 8c3-1.5 5-3 5-3s-2 3.17-3.5 6c-1.5 2.83-3.5 5-3.5 5"/><path d="M17 8l-4 4"/></svg>`,
    };

    /* ================================================================
       AUTOCOMPLETE (using PyPI simple search)
       ================================================================ */
    nameInput.addEventListener('input', () => {
        clearTimeout(autocompleteTimer);
        const query = nameInput.value.trim();
        if (query.length < 2) {
            hideAutocomplete();
            return;
        }
        autocompleteTimer = setTimeout(() => fetchAutocomplete(query), AUTOCOMPLETE_DELAY);
    });

    nameInput.addEventListener('keydown', (e) => {
        if (!acDropdown.classList.contains('visible')) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            autocompleteIndex = Math.min(autocompleteIndex + 1, autocompleteResults.length - 1);
            highlightAcItem();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            autocompleteIndex = Math.max(autocompleteIndex - 1, 0);
            highlightAcItem();
        } else if (e.key === 'Enter' && autocompleteIndex >= 0) {
            e.preventDefault();
            selectAcItem(autocompleteResults[autocompleteIndex]);
        } else if (e.key === 'Escape') {
            hideAutocomplete();
        }
    });

    nameInput.addEventListener('blur', () => {
        // Delay to allow click on autocomplete item
        setTimeout(hideAutocomplete, 200);
    });

    async function fetchAutocomplete(query) {
        try {
            // Use PyPI search JSON endpoint (XMLRPC is deprecated, use warehouse search)
            const resp = await fetch(`https://pypi.org/pypi/${encodeURIComponent(query)}/json`);
            if (resp.ok) {
                const data = await resp.json();
                // Single exact match
                autocompleteResults = [{ name: data.info.name, version: data.info.version }];
                renderAutocomplete();
                return;
            }
        } catch (e) { /* ignore */ }

        // Fallback: try a search-style approach by looking up common variations
        const variations = [query, query.replace(/-/g, '_'), query.replace(/_/g, '-')];
        const uniqueResults = new Map();
        const promises = variations.map(async (v) => {
            try {
                const r = await fetch(`https://pypi.org/pypi/${encodeURIComponent(v)}/json`);
                if (r.ok) {
                    const d = await r.json();
                    uniqueResults.set(d.info.name.toLowerCase(), { name: d.info.name, version: d.info.version });
                }
            } catch (e) { /* ignore */ }
        });
        await Promise.all(promises);
        autocompleteResults = Array.from(uniqueResults.values()).slice(0, 8);
        if (autocompleteResults.length > 0) {
            renderAutocomplete();
        } else {
            hideAutocomplete();
        }
    }

    function renderAutocomplete() {
        acDropdown.innerHTML = '';
        autocompleteIndex = -1;
        autocompleteResults.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.setAttribute('role', 'option');
            div.innerHTML = `<span class="ac-name">${escapeHtml(item.name)}</span><span class="ac-version">${escapeHtml(item.version)}</span>`;
            div.addEventListener('mousedown', (e) => {
                e.preventDefault();
                selectAcItem(item);
            });
            acDropdown.appendChild(div);
        });
        acDropdown.classList.add('visible');
    }

    function highlightAcItem() {
        const items = acDropdown.querySelectorAll('.autocomplete-item');
        items.forEach((el, i) => el.classList.toggle('active', i === autocompleteIndex));
    }

    function selectAcItem(item) {
        nameInput.value = item.name;
        hideAutocomplete();
        nameInput.focus();
    }

    function hideAutocomplete() {
        acDropdown.classList.remove('visible');
        acDropdown.innerHTML = '';
        autocompleteResults = [];
        autocompleteIndex = -1;
    }

    /* ================================================================
       SEARCH HANDLER
       ================================================================ */
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = nameInput.value.trim();
        const version = versionInput.value.trim() || 'latest';
        if (!name) return;

        hideAutocomplete();
        resetUI();
        showLoader(true);

        try {
            totalNodesLoaded = 0;
            await fetchDeps(name, version, depTree, 0);
            const directCount = depTree.children.length;
            statDirect.textContent = directCount;
            statTotal.textContent = totalNodesLoaded;
            depCount.textContent = `${directCount} dep${directCount !== 1 ? 's' : ''}`;
            statsBar.style.display = 'flex';
            results.classList.add('visible');
        } catch (err) {
            showError(err.message);
        } finally {
            showLoader(false);
        }
    });

    /* ================================================================
       FETCH DEPENDENCIES
       ================================================================ */
    async function fetchDeps(packageName, packageVersion, parentUl, depth) {
        const key = `${packageName}@${packageVersion}:${depth}`;
        if (activeFetches.has(key) || depth > MAX_DEPTH) return;
        activeFetches.add(key);

        try {
            let versionToFetch = packageVersion;

            // Resolve "latest"
            if (versionToFetch.toLowerCase() === 'latest') {
                const latestData = await apiFetch(`https://pypi.org/pypi/${encodeURIComponent(packageName)}/json`, packageName, 'latest');
                versionToFetch = latestData.info?.version;
                if (!versionToFetch) throw new Error(`Cannot determine latest version for "${packageName}".`);
                if (depth === 0) {
                    pkgDisplay.textContent = `${latestData.info.name} ${versionToFetch}`;
                }
            }

            // Fetch specific version
            const data = await apiFetch(`https://pypi.org/pypi/${encodeURIComponent(packageName)}/${encodeURIComponent(versionToFetch)}/json`, packageName, versionToFetch);

            if (depth === 0 && !pkgDisplay.textContent) {
                pkgDisplay.textContent = `${data.info.name} ${data.info.version}`;
            }

            const deps = data.info?.requires_dist || [];

            if (deps.length === 0) {
                if (depth === 0) {
                    emptyMsg.classList.add('visible');
                }
                return deps;
            }

            emptyMsg.classList.remove('visible');
            renderNodes(deps, parentUl, depth + 1);
            return deps;
        } finally {
            activeFetches.delete(key);
        }
    }

    async function apiFetch(url, name, version) {
        const resp = await fetch(url);
        if (resp.status === 404) {
            throw new Error(version === 'latest'
                ? `Package "${name}" not found on PyPI.`
                : `"${name}" version ${version} not found on PyPI.`
            );
        }
        if (!resp.ok) {
            throw new Error(`PyPI API error (${resp.status}) for "${name}".`);
        }
        return resp.json();
    }

    /* ================================================================
       RENDER DEPENDENCY NODES
       ================================================================ */
    const DEP_REGEX = /^([a-zA-Z0-9][a-zA-Z0-9._-]*)(?:\[([^\]]*)\])?\s*(?:\(([^)]*)\))?(?:\s*;.*)?$/;

    function parseDep(raw) {
        const hasCondition = raw.includes(';');
        const mainPart = hasCondition ? raw.split(';')[0].trim() : raw.trim();
        const condition = hasCondition ? raw.split(';').slice(1).join(';').trim() : '';

        const match = mainPart.match(DEP_REGEX);
        if (match) {
            return {
                name: match[1],
                extras: match[2] || '',
                version: match[3] || '',
                condition,
                raw,
                expandable: true,
            };
        }
        // Fallback: extract name
        const fallbackName = mainPart.split(/[=<>!~\s[(]/)[0].trim();
        return {
            name: fallbackName,
            extras: '',
            version: '',
            condition,
            raw,
            expandable: !!fallbackName,
        };
    }

    function renderNodes(deps, parentUl, depth) {
        deps.forEach((rawDep, idx) => {
            const dep = parseDep(rawDep);
            if (!dep.name) return;

            totalNodesLoaded++;

            const li = document.createElement('li');
            li.className = 'dep-node glass';
            li.setAttribute('role', 'treeitem');
            if (depth <= 1) li.style.animationDelay = `${idx * 0.04}s`;
            else { li.style.animation = 'none'; li.style.opacity = '1'; }

            const row = document.createElement('div');
            row.className = 'dep-row';

            // Icon
            const icon = document.createElement('div');
            icon.className = 'dep-icon';
            icon.innerHTML = ICONS.package;

            // Info
            const info = document.createElement('div');
            info.className = 'dep-info';

            const nameEl = document.createElement('a');
            nameEl.className = 'dep-name';
            nameEl.href = `https://pypi.org/project/${encodeURIComponent(dep.name)}/`;
            nameEl.target = '_blank';
            nameEl.rel = 'noopener noreferrer';
            nameEl.textContent = dep.name;

            const versionLabel = [dep.extras ? `[${dep.extras}]` : '', dep.version ? `(${dep.version})` : ''].filter(Boolean).join(' ') || 'any';
            const versionEl = document.createElement('span');
            versionEl.className = 'dep-version';
            versionEl.textContent = versionLabel;
            versionEl.title = rawDep;

            info.appendChild(nameEl);
            info.appendChild(versionEl);

            if (dep.condition) {
                const badge = document.createElement('span');
                badge.className = 'dep-badge conditional';
                badge.textContent = 'conditional';
                badge.title = dep.condition;
                info.appendChild(badge);
            }

            row.appendChild(icon);
            row.appendChild(info);

            // Sub-tree
            const subUl = document.createElement('ul');
            subUl.className = 'sub-tree';
            subUl.setAttribute('role', 'group');

            if (dep.expandable) {
                const btn = document.createElement('button');
                btn.className = 'expand-btn';
                btn.innerHTML = ICONS.chevron;
                btn.title = `Expand ${dep.name}`;
                btn.setAttribute('aria-label', `Expand dependencies for ${dep.name}`);

                let loaded = false;

                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();

                    if (btn.classList.contains('no-deps')) return;

                    const isExpanded = btn.classList.contains('expanded');

                    if (isExpanded) {
                        // Collapse
                        btn.classList.remove('expanded');
                        subUl.style.maxHeight = '0';
                        subUl.classList.remove('visible');
                        return;
                    }

                    // Expand
                    btn.classList.add('expanded');

                    if (!loaded) {
                        btn.classList.add('loading');
                        btn.innerHTML = ICONS.spinner;
                        btn.disabled = true;

                        try {
                            const result = await fetchDeps(dep.name, 'latest', subUl, depth);
                            loaded = true;

                            if (!result || result.length === 0) {
                                btn.classList.add('no-deps');
                                btn.innerHTML = ICONS.leaf;
                                btn.title = `${dep.name} has no dependencies`;
                                const noDepMsg = document.createElement('li');
                                noDepMsg.className = 'dep-node';
                                noDepMsg.style.cssText = 'background:none;border:none;box-shadow:none;animation:none;opacity:1;';
                                noDepMsg.innerHTML = `<div class="dep-row" style="justify-content:center;padding:8px;"><span style="color:var(--text-muted);font-size:0.8rem;font-style:italic;">No further dependencies</span></div>`;
                                subUl.appendChild(noDepMsg);
                            } else {
                                btn.innerHTML = ICONS.chevron;
                                // Update totals
                                statTotal.textContent = totalNodesLoaded;
                            }
                        } catch (err) {
                            btn.innerHTML = ICONS.alert;
                            btn.title = err.message;
                            btn.classList.remove('expanded');
                            const errLi = document.createElement('li');
                            errLi.className = 'dep-node';
                            errLi.style.cssText = 'background:none;border:none;box-shadow:none;animation:none;opacity:1;';
                            errLi.innerHTML = `<div class="dep-row" style="justify-content:center;padding:8px;"><span style="color:#ff6b6b;font-size:0.8rem;">${escapeHtml(err.message)}</span></div>`;
                            subUl.appendChild(errLi);
                        } finally {
                            btn.classList.remove('loading');
                            btn.disabled = false;
                        }
                    } else {
                        btn.innerHTML = ICONS.chevron;
                    }

                    // Show sub-tree
                    subUl.classList.add('visible');
                    subUl.style.maxHeight = subUl.scrollHeight + 'px';

                    // Update parent heights (for nested trees)
                    updateParentHeights(subUl);
                });

                row.appendChild(btn);
            }

            li.appendChild(row);
            li.appendChild(subUl);
            parentUl.appendChild(li);
        });
    }

    /* Recalculate max-height of ancestor sub-trees when a nested tree expands */
    function updateParentHeights(el) {
        let node = el.parentElement;
        while (node) {
            if (node.classList && node.classList.contains('sub-tree') && node.classList.contains('visible')) {
                node.style.maxHeight = node.scrollHeight + 'px';
            }
            node = node.parentElement;
        }
    }

    /* ================================================================
       UI HELPERS
       ================================================================ */
    function showLoader(show) {
        loader.classList.toggle('visible', show);
    }

    function showError(msg) {
        errorCard.textContent = msg;
        errorCard.classList.add('visible');
        results.classList.remove('visible');
    }

    function resetUI() {
        depTree.innerHTML = '';
        errorCard.classList.remove('visible');
        errorCard.textContent = '';
        results.classList.remove('visible');
        emptyMsg.classList.remove('visible');
        statsBar.style.display = 'none';
        activeFetches.clear();
        totalNodesLoaded = 0;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }
</script>
</body>
</html>
